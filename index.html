<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesper RTX</title>
    <style>
        body { background-color: #0d0d12; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .profile-img { width: 100px; height: 100px; background-color: #c084fc; border-radius: 50%; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 2px solid #8b5cf6; box-shadow: 0 0 20px #2dd4bf; }
        h1 { color: #a855f7; margin: 0; }
        .subtitle { color: #9ca3af; margin-bottom: 30px; }
        .card { width: 100%; max-width: 350px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; text-decoration: none; display: block; border: 2px solid #8b5cf6; }
        .card-green { border: 2px solid #2dd4bf; }
        .card h2 { margin: 10px 0; color: white; }
        .desc { color: #d1d5db; font-size: 14px; }
    </style>
</head>
<body>

    <div class="profile-img">
        <img src="logo.png" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <h1>ASX</h1>
    <p class="subtitle">الموقع الرسمي لتحميل نسخة Delta ASX</p>

    <a href="#" class="card">
        <h2>تطبيقات iOS</h2>
        <span class="desc">تحميل نسخة دلتا المعدلة (IPA)</span>
    </a>

    <a href="#" class="card card-green">
        <h2 style="color:#2dd4bf">حماية وأمان</h2>
        <span class="desc">فحص الملفات والتأكد من سلامتها</span>
    </a>

</body>
</html>
